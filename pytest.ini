[pytest]
markers =
    caso1: Caso 1 - Diferenças de grafia tipográficas (acentuação, apóstrofo, cedilha)
    caso2: Caso 2 - Sobrenome + iniciais dos nomes (com ou sem pontos)
    caso3: Caso 3 - Partículas de/da/do e pontos opcionais em abreviações
    caso4: Caso 4 - Iniciais dos nomes agrupadas + sobrenome
    caso5: Caso 5 - IDs diferentes para o mesmo autor
